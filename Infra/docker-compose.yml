services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: airport
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 0205116969
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
volumes:
  dbdata:
  YAML