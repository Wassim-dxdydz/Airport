version: "3.9"

services:
  # PostgreSQL Database
  db:
    image: postgres:17
    container_name: airport-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - airport-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: airport-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      R2DBC_URL: r2dbc:postgresql://db:5432/${POSTGRES_DB}
    ports:
      - "8080:8080"
    networks:
      - airport-net
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: airport-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8080
    ports:
      - "3000:3000"
    networks:
      - airport-net
    restart: unless-stopped

  # PgAdmin (optionnel)
  pgadmin:
    image: dpage/pgadmin4
    container_name: airport-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - airport-net

volumes:
  dbdata:

networks:
  airport-net:
    driver: bridge
